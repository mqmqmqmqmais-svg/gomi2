<html lang="ja">

    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(10, 10, 15, 0.98);
            --accent-color: #a252ff;
            --accent-glow: rgba(162, 82, 255, 0.8);
            --border-color: #5c2ea6;
            --text-color: #ffffff;
            --btn-bg: linear-gradient(180deg, #1f1135 0%, #05020a 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: var(--text-color);
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 150%);
            pointer-events: none;
            z-index: -1;
        }

        .ad-container {
            width: 90%;
            max-width: 450px;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: bold;
            margin: 15px 0;
            border-radius: 4px;
            letter-spacing: 2px;
            z-index: 10;
        }

        #app-container {
            width: 95%;
            max-width: 450px;
            height: 70vh;
            min-height: 500px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 2px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        #progress-container {
            width: 100%;
            height: 12px;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #555, var(--accent-color));
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #question-number {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow-y: auto;
        }

        #main-text {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            padding: 0 10px;
            white-space: pre-wrap;
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        button, .menu-btn {
            background: var(--btn-bg);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 18px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            text-align: center;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.2s;
        }

        button:active, .menu-btn:active {
            transform: translateY(3px);
            background: var(--border-color);
        }

        /* 🏠 ホームへ戻る専用の控えめボタン */
        .home-btn {
            background: transparent;
            border: 1px dashed #666;
            color: #aaa;
            padding: 12px;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .analyzer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .magic-circle {
            width: 100px;
            height: 100px;
            border: 4px dashed var(--accent-color);
            border-radius: 50%;
            position: relative;
            animation: spinCircle 3s linear infinite;
        }

        @keyframes spinCircle {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playHeavyClick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.1); 
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        
        osc.start(t);
        osc.stop(t + 0.1);
    }

    /* 🌌 Canvasパーティクル：全5種類の独立したエフェクト */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleMode = 'default'; 

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            if(particleMode === 'psycho') {
                // 【エフェクト1】血の滴り・スプラッター（重力で落ちる）
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.5 - 50;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = Math.random() * 3 + 1;
                this.size = Math.random() * 6 + 2;
                this.color = `rgba(180, 0, 20, ${Math.random() * 0.8 + 0.2})`;
            } else if(particleMode === 'talent') {
                // 【エフェクト2】マトリックス（上から下へ等速落下）
                this.x = Math.floor(Math.random() * (canvas.width/20)) * 20;
                this.y = -Math.random() * canvas.height;
                this.vx = 0;
                this.vy = Math.random() * 20 + 10;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(0, 255, ${Math.random()*150+100}, 0.9)`;
                this.char = String.fromCharCode(0x30A0 + Math.random() * 96);
            } else if(particleMode === 'future') {
                // 【エフェクト3】ワープ（中央から放射状に拡大）
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed; 
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(255, ${Math.random()*100+150}, 0, 0.8)`;
            } else if(particleMode === 'romance') {
                // 【エフェクト4】狂愛の竜巻（画面外周から中心へ向かって渦巻く）
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * canvas.width;
                this.speed = Math.random() * 0.05 + 0.01;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.color = `rgba(255, ${Math.random()*100}, ${Math.random()*100 + 100}, 0.8)`;
            } else if(particleMode === 'mental') {
                // 【エフェクト5】奈落の泡（深海の下から上へ高速で揺らめきながら上昇）
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -(Math.random() * 8 + 4);
                this.size = Math.random() * 5 + 2;
                this.color = `rgba(0, ${Math.random()*150+100}, 255, 0.6)`;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5);
                this.vy = (Math.random() - 0.5);
                this.size = Math.random() * 2;
                this.color = 'rgba(162, 82, 255, 0.5)';
            }
        }
        update() {
            if(particleMode === 'psycho') {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1; // 重力加速度
                this.size *= 0.99; // 徐々に細くなる
                if (this.size < 0.5 || this.y > canvas.height) this.reset();
            } else if(particleMode === 'romance') {
                this.angle += this.speed;
                this.radius -= 2; // 中心へ
                this.x = canvas.width / 2 + Math.cos(this.angle) * this.radius;
                this.y -= 1; // やや上に昇る
                if (this.radius < 10 || this.y < 0) this.reset();
            } else if(particleMode === 'mental') {
                this.x += this.vx;
                this.y += this.vy;
                this.x += Math.sin(this.y * 0.05); // 水中の揺らめき
                if (this.y < -20) this.reset();
            } else {
                this.x += this.vx;
                this.y += this.vy;
                if(particleMode === 'future') this.size *= 1.05; // 迫ってくる感
                if (this.y > canvas.height || this.y < 0 || this.x > canvas.width || this.x < 0) this.reset();
            }
        }
        draw() {
            ctx.fillStyle = this.color;
            if(particleMode === 'talent') {
                ctx.font = 'bold 18px monospace';
                ctx.fillText(this.char, this.x, this.y);
            } else {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    for (let i = 0; i < 200; i++) particles.push(new Particle());

    function animateParticles() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }

            results: [
                { maxScore: 4, text: "【メンタル強度：鋼（鉄壁の心）】\nあなたのメンタルは非常に強靭です。多少のストレスや失敗では動じず、すぐに切り替えて前に進むことができます。逆境に強いタフな精神力の持ち主です。" },
                { maxScore: 9, text: "【メンタル強度：普通（しなやかな心）】\n落ち込むこともありますが、時間が経てば自力で回復できるバランスの良いメンタルです。ストレスを適度に受け流す術を知っています。" },
                { maxScore: 99, text: "【メンタル強度：繊細（ガラスの心）】\n現在、あなたのメンタルは非常にすり減っている状態です。外部からの刺激に敏感で、ストレスを溜め込みやすくなっています。無理をせず、まずは心と体をゆっくり休める環境を作ってください。" }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');
    let currentIdx = 0, totalScore = 0, currentData = null;

    function applyTheme(t) {
        const r = document.documentElement;
        r.style.setProperty('--bg-color', t.bg);
        r.style.setProperty('--card-bg', t.card);
        r.style.setProperty('--accent-color', t.accent);
        r.style.setProperty('--accent-glow', t.glow);
        r.style.setProperty('--border-color', t.border);
        r.style.setProperty('--btn-bg', t.btn);
        particleMode = currentData.mode;
        particles.forEach(p => p.reset());
    }

    if (shindanId && shindanDatabase[shindanId]) {
        currentData = shindanDatabase[shindanId];
        applyTheme(currentData.theme);
        document.title = currentData.title;
        document.getElementById("progress-container").style.display = "block";
        document.getElementById("action-area").innerHTML = `<button onclick="startQuestion()">診断を開始する</button><button class="home-btn" onclick="goHome()">🏠 ホームへ戻る</button>`;
        document.getElementById("main-text").innerText = currentData.title;
        document.getElementById("question-number").innerText = "READY";
    }

    function goHome() {
        playHeavyClick();
        window.location.href = window.location.pathname; // URLパラメータを消してトップへ
    }

    function startQuestion() {
        playHeavyClick();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) { showAdScreen(); return; }
        
        const prog = (currentIdx / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = prog + "%";
        document.getElementById("question-number").innerText = `QUESTION: ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;
        
        const area = document.getElementById("action-area");
        area.innerHTML = `
            <button onclick="answer(true)">はい / YES</button>
            <button onclick="answer(false)">いいえ / NO</button>
            <button class="home-btn" onclick="goHome()">🏠 ホームへ戻る</button>
        `;
    }

    function answer(isYes) {
        playHeavyClick();
        if(isYes) totalScore += currentData.questions[currentIdx].score;
        currentIdx++;
        loadQuestion();
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "ANALYZING...";
        
        document.getElementById("content-area").innerHTML = `
            <div class="analyzer-container">
                <div class="magic-circle"></div>
                <div id="main-text" style="margin-top:20px; font-size:1.1rem; color:#ccc;">結果を解析中...</div>
                <div id="ad-timer" style="font-size:2rem; color:var(--accent-color); font-weight:bold;">5</div>
            </div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let t = 5;
        const intv = setInterval(() => {
            t--;
            document.getElementById("ad-timer").innerText = t;
            if (t <= 0) { clearInterval(intv); showResult(); }
        }, 1000);
    }

    function showResult() {
        playHeavyClick();
        
        document.getElementById("question-number").innerText = "RESULT";
        let res = currentData.results.find(r => totalScore <= r.maxScore) || currentData.results[currentData.results.length-1];
        
        document.getElementById("content-area").innerHTML = `<div id="main-text" style="font-size:1.2rem; text-align:left; padding:10px;">${res.text}</div>`;
        document.getElementById("action-area").innerHTML = `<a href="${window.location.pathname}" class="menu-btn" onclick="playHeavyClick()">🏠 トップに戻る</a>`;
    }
</script>

</body>
</html>
