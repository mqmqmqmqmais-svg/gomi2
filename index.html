<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【極限超越】次元崩壊・超・診断占いシステム</title>
    <style>
        /* 🎨 限界突破ネオン・次元崩壊変数 */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(5, 5, 10, 0.85);
            --accent-color: #a252ff;
            --accent-glow: rgba(162, 82, 255, 0.8);
            --border-color: #5c2ea6;
            --text-color: #ffffff;
            --btn-bg: linear-gradient(180deg, #1f1135 0%, #05020a 100%);
            --grid-color: rgba(162, 82, 255, 0.15);
            --glitch-color1: #00ffff;
            --glitch-color2: #ff00ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: var(--text-color);
            font-family: 'Impact', 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* 画面外への演出漏れを防ぐ */
            perspective: 1000px; /* 3D空間の歪み用 */
        }

        /* 🌌 Canvas背景（リアルタイムパーティクル演算用） */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        /* 📺 ブラウン管スキャンライン＆ヴィネット効果 */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 999;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
        }

        /* 💡 広告エリア（激しい発光） */
        .ad-container {
            width: 90%;
            max-width: 450px;
            height: 60px;
            background: rgba(0, 0, 0, 0.7);
            border: 2px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 900;
            margin: 15px 0;
            border-radius: 4px;
            letter-spacing: 4px;
            z-index: 10;
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow);
            animation: adFlash 3s infinite alternate;
        }

        /* 📱 アプリコンテナ（3Dホバー＆常時脈動） */
        #app-container {
            width: 95%;
            max-width: 450px;
            height: 70vh;
            min-height: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            border: 3px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px var(--accent-glow), inset 0 0 30px rgba(255,255,255,0.1);
            transform-style: preserve-3d;
            animation: containerFloat 4s ease-in-out infinite, rgbSplit 5s infinite;
        }

        /* 📊 超光速プログレスバー */
        #progress-container {
            width: 100%;
            height: 12px;
            background: #000;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, var(--accent-color));
            box-shadow: 0 0 20px #fff;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progressSpark 0.5s infinite;
        }

        #question-number {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: 5px;
            font-weight: 900;
            text-shadow: 0 0 10px var(--accent-glow);
            text-align: center;
        }

        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* 💥 過剰文字装飾・グリッチテキスト */
        #main-text {
            font-size: 1.6rem;
            line-height: 1.5;
            font-weight: 900;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px #000, 0 0 15px var(--accent-color);
            position: relative;
            transition: all 0.3s;
        }
        .glitch-active {
            animation: glitchText 0.3s cubic-bezier(.25, .46, .45, .94) both infinite;
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        /* ✨ 破壊的立体ボタン */
        button, .menu-btn {
            background: var(--btn-bg);
            color: #fff;
            border: 2px solid var(--border-color);
            padding: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 900;
            text-decoration: none;
            display: block;
            text-align: center;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 0px calc(var(--border-color) - #222), 0 15px 20px rgba(0,0,0,0.8), 0 0 15px var(--accent-glow);
            transition: all 0.1s;
            text-shadow: 0 0 8px #fff;
        }

        /* ボタンホバーのレーザーエフェクト */
        button::before, .menu-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: translateY(-50%) skewX(-45deg);
            transition: 0.5s;
        }
        button:hover::before, .menu-btn:hover::before {
            left: 200%;
        }

        /* 押し込み時の画面揺れ＆発光 */
        button:active, .menu-btn:active {
            transform: translateY(8px) scale(0.98);
            box-shadow: 0 0px 0px transparent, 0 5px 10px rgba(0,0,0,0.9), 0 0 30px var(--accent-color);
            background: var(--accent-color);
            color: #000;
        }

        /* 🌀 広告待機中の異次元エフェクト */
        .analyzer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .magic-circle {
            width: 150px;
            height: 150px;
            border: 8px dashed var(--accent-color);
            border-radius: 50%;
            position: relative;
            animation: spinCircle 2s linear infinite;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px var(--accent-glow);
        }
        .magic-circle::before {
            content: '';
            position: absolute;
            top: -15px; left: -15px; right: -15px; bottom: -15px;
            border: 4px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spinCircle 1s linear infinite reverse;
        }

        /* 🎬 限界突破アニメーション群 */
        @keyframes containerFloat {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-10px) rotateX(-2deg); }
        }
        @keyframes rgbSplit {
            0%, 100% { box-shadow: -3px 0 15px var(--glitch-color1), 3px 0 15px var(--glitch-color2), 0 0 40px var(--accent-glow); }
            50% { box-shadow: 3px 0 15px var(--glitch-color1), -3px 0 15px var(--glitch-color2), 0 0 60px var(--accent-glow); }
        }
        @keyframes adFlash {
            0%, 100% { opacity: 1; border-color: var(--accent-color); }
            50% { opacity: 0.6; border-color: #fff; text-shadow: 0 0 10px #fff; }
        }
        @keyframes progressSpark {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }
        @keyframes spinCircle {
            100% { transform: rotate(360deg); }
        }
        @keyframes glitchText {
            0% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
            20% { transform: translate(-2px, 2px); text-shadow: 2px 0 red, -2px 0 blue; }
            40% { transform: translate(-2px, -2px); text-shadow: 2px 0 red, -2px 0 blue; }
            60% { transform: translate(2px, 2px); text-shadow: -2px 0 red, 2px 0 blue; }
            80% { transform: translate(2px, -2px); text-shadow: -2px 0 red, 2px 0 blue; }
            100% { transform: translate(0); text-shadow: -2px 0 red, 2px 0 blue; }
        }
        /* 画面全体の衝撃波 */
        .screen-shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(5px, 5px) rotate(1deg); filter: invert(100%); }
            50% { transform: translate(-5px, -5px) rotate(-1deg); }
            75% { transform: translate(-5px, 5px) rotate(1deg); filter: invert(100%); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="ad-container" id="top-ad">【NEON AD SPACE: TOP】</div>

    <div id="app-container">
        <div id="progress-container" style="display:none;">
            <div id="progress-bar"></div>
        </div>
        <div id="question-number">SYSTEM BOOTING...</div>
        <div id="content-area">
            <div id="main-text">🔮 超次元心理オラクル 🔮<br><span style="font-size:1rem; color:#aaa;">運命を破壊する15の質問</span></div>
        </div>
        <div id="action-area">
            <a href="?id=psycho" class="menu-btn" style="--accent-color:#ff003c; --border-color:#8a0020; --btn-bg:linear-gradient(180deg, #2a000a, #000);" onclick="impactEffect()">☠ 1. サイコパス狂気診断</a>
            <a href="?id=talent" class="menu-btn" style="--accent-color:#00ff00; --border-color:#008a00; --btn-bg:linear-gradient(180deg, #002a00, #000);" onclick="impactEffect()">⚡ 2. 神殺しの器・才能覚醒</a>
            <a href="?id=future" class="menu-btn" style="--accent-color:#ffaa00; --border-color:#8a5c00; --btn-bg:linear-gradient(180deg, #2a1c00, #000);" onclick="impactEffect()">🌌 3. 来世の業象・時空転生</a>
        </div>
    </div>

    <div class="ad-container" id="bottom-ad">【NEON AD SPACE: BOTTOM】</div>

<script>
    /* 🎵 狂気のWeb Audio API（鼓膜を揺らす重低音＆ノイズ） */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHeavyClick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, t);
        osc.frequency.exponentialRampToValueAtTime(40, t + 0.1); // ドロップ音
        gain.gain.setValueAtTime(0.2, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        
        osc.start(t);
        osc.stop(t + 0.1);
    }

    function playGlitchSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bufferSize = audioCtx.sampleRate * 0.2;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1; // ホワイトノイズ
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 1000 + Math.random() * 2000;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
        
        noise.connect(filter).connect(gain).connect(audioCtx.destination);
        noise.start();
    }

    /* 💥 画面崩壊エフェクトトリガー */
    function impactEffect() {
        playHeavyClick();
        document.body.classList.remove("screen-shake");
        void document.body.offsetWidth; // リフロー強制
        document.body.classList.add("screen-shake");
        
        const txt = document.getElementById("main-text");
        if(txt) {
            txt.classList.add("glitch-active");
            setTimeout(() => txt.classList.remove("glitch-active"), 300);
        }
    }

    /* 🌌 Canvasパーティクル演算（テーマ別に完全変化） */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleMode = 'default'; // default, psycho, talent, future

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            if(particleMode === 'psycho') {
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = Math.random() * 5 + 2; // 下へ滴る血
                this.size = Math.random() * 4 + 1;
                this.color = `rgba(255, ${Math.random()*50}, ${Math.random()*50}, 0.8)`;
            } else if(particleMode === 'talent') {
                this.x = Math.floor(Math.random() * (canvas.width/20)) * 20; // グリッド
                this.y = -Math.random() * canvas.height;
                this.vx = 0;
                this.vy = Math.random() * 10 + 5; // マトリックス落下
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(0, 255, ${Math.random()*150+100}, 0.8)`;
            } else if(particleMode === 'future') {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed; // ワープ放射
                this.size = Math.random() * 3 + 1;
                this.color = `rgba(255, ${Math.random()*100+150}, 0, 0.8)`;
            } else {
                this.vx = (Math.random() - 0.5);
                this.vy = (Math.random() - 0.5);
                this.size = Math.random() * 2;
                this.color = 'rgba(162, 82, 255, 0.5)';
            }
            this.life = 1;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if(particleMode === 'future') {
                this.size *= 1.05; // 迫ってくる感
            }
            if (this.y > canvas.height || this.y < 0 || this.x > canvas.width || this.x < 0) {
                this.reset();
            }
        }
        draw() {
            ctx.fillStyle = this.color;
            if(particleMode === 'talent') {
                ctx.font = '15px monospace';
                ctx.fillText(Math.random()>0.5?'1':'0', this.x, this.y);
            } else {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    for (let i = 0; i < 150; i++) particles.push(new Particle());

    function animateParticles() {
        ctx.fillStyle = particleMode === 'future' ? 'rgba(0, 0, 0, 0.2)' : 'rgba(0, 0, 0, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* 💡 テーマ別データベース＆設定 */
    const shindanDatabase = {
        psycho: {
            title: "☠ サイコパス狂気診断",
            mode: "psycho",
            theme: { bg: "#0a0000", card: "rgba(30, 0, 0, 0.85)", accent: "#ff003c", glow: "rgba(255, 0, 60, 0.8)", border: "#8a0020", btn: "linear-gradient(180deg, #3a000d, #000)" },
            questions: [
                { text: "他人の不幸なニュースを見ると、顔の筋肉が微かに緩む？", score: 2 },
                { text: "目的のためなら、親しい人間も単なる「リソース（資源）」として計算できる？", score: 3 },
                { text: "ルールは絶対ではなく、自分が捕まらないためのガイドラインに過ぎない？", score: 2 },
                { text: "恐怖やパニックに陥った人間の顔を観察するのが好きだ？", score: 3 },
                { text: "他人に共感しているフリをするのは、もはや息を吸うより簡単だ？", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【観測者：一般人】\nあなたの精神は極めて正常です。狂気の世界に踏み入るには優しすぎます。" },
                { maxScore: 10, text: "【潜伏者：仮面の異常者】\nあなたは社会に溶け込んでいますが、確実に「黒い衝動」を隠し持っています。" },
                { maxScore: 99, text: "【超越者：純粋悪の顕現】\nあなたの本質は完全なサイコパスです。感情という無駄な機能を排除した、恐るべき合理主義の化身です。" }
            ]
        },
        talent: {
            title: "⚡ 神殺しの器・才能覚醒",
            mode: "talent",
            theme: { bg: "#000a05", card: "rgba(0, 30, 15, 0.85)", accent: "#00ffaa", glow: "rgba(0, 255, 170, 0.8)", border: "#008a4c", btn: "linear-gradient(180deg, #003a20, #000)" },
            questions: [
                { text: "世界がすべてコード（数値）の羅列に見える瞬間がある？", score: 3 },
                { text: "他人の行動パターンを瞬時に解析し、次の言葉を先読みできる？", score: 2 },
                { text: "一つの物事に没頭すると、食事や睡眠という概念すら忘却する？", score: 2 },
                { text: "既存のシステムを破壊し、ゼロから組み直したい衝動に駆られる？", score: 3 },
                { text: "直感よりもデータ、感情よりも確率を絶対の神として信奉している？", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【歯車：適応型ワーカー】\nあなたは社会システムを支える優秀な歯車です。平穏な日常が約束されています。" },
                { maxScore: 10, text: "【異端児：バグの発生源】\n既存の枠組みを壊す可能性を秘めています。クリエイターや革命家の素質あり。" },
                { maxScore: 99, text: "【アーキテクト：新世界の創造主】\n神をも凌駕する演算能力。世界を支配し、再構築するための圧倒的な裏才能が覚醒しています。" }
            ]
        },
        future: {
            title: "🌌 来世の業象・時空転生",
            mode: "future",
            theme: { bg: "#050010", card: "rgba(15, 0, 40, 0.85)", accent: "#ffaa00", glow: "rgba(255, 170, 0, 0.8)", border: "#8a00cc", btn: "linear-gradient(180deg, #3a0066, #000)" },
            questions: [
                { text: "夜空の星を見上げると、そこが自分の「本当の帰る場所」だと感じる？", score: 3 },
                { text: "今の地球の文明レベルは、あまりにも低俗で退屈に思える？", score: 2 },
                { text: "夢の中で、重力に逆らって宇宙空間を浮遊した記憶がある？", score: 3 },
                { text: "機械文明より、魔術や精神感応（テレパシー）の世界に惹かれる？", score: 2 },
                { text: "肉体という「器」は不便であり、純粋なエネルギー体になりたい？", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【地球再演：人間（ループ）】\nあなたの魂はまだ地球に未練があります。来世もまた、人間としてドラマを演じるでしょう。" },
                { maxScore: 10, text: "【異界放浪：エルフの賢者】\n地球を卒業し、魔法と自然が調和する高次元の異世界で、悠久の時を生きる賢者に転生します。" },
                { maxScore: 99, text: "【神格化：次元喰いの星霊】\n肉体を捨て、星を喰らい宇宙を創造する概念的存在（神）へ至ります。この宇宙はあなたの箱庭となります。" }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');
    let currentIdx = 0, totalScore = 0, currentData = null;

    function applyTheme(t) {
        const r = document.documentElement;
        r.style.setProperty('--bg-color', t.bg);
        r.style.setProperty('--card-bg', t.card);
        r.style.setProperty('--accent-color', t.accent);
        r.style.setProperty('--accent-glow', t.glow);
        r.style.setProperty('--border-color', t.border);
        r.style.setProperty('--btn-bg', t.btn);
        particleMode = currentData.mode;
        particles.forEach(p => p.reset());
    }

    if (shindanId && shindanDatabase[shindanId]) {
        currentData = shindanDatabase[shindanId];
        applyTheme(currentData.theme);
        document.title = currentData.title;
        document.getElementById("progress-container").style.display = "block";
        document.getElementById("action-area").innerHTML = `<button onclick="startQuestion()">⚡ 精神をリンクする ⚡</button>`;
        document.getElementById("main-text").innerText = currentData.title;
        document.getElementById("question-number").innerText = "DIMENSION SYNC READY";
    }

    function startQuestion() {
        impactEffect();
        playGlitchSound();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) { showAdScreen(); return; }
        
        const prog = (currentIdx / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = prog + "%";
        document.getElementById("question-number").innerText = `SCANNING MEMORY: ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;
        
        const area = document.getElementById("action-area");
        area.innerHTML = `
            <button onclick="answer(true)">[ YES / 肯定 ]</button>
            <button onclick="answer(false)">[ NO / 否定 ]</button>
        `;
    }

    function answer(isYes) {
        impactEffect();
        if(Math.random() > 0.7) playGlitchSound();
        if(isYes) totalScore += currentData.questions[currentIdx].score;
        currentIdx++;
        loadQuestion();
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "⚠️ SYSTEM OVERLOAD ⚠️";
        
        document.getElementById("content-area").innerHTML = `
            <div class="analyzer-container">
                <div class="magic-circle"></div>
                <div id="main-text" style="margin-top:20px; font-size:1.2rem; animation: glitchText 0.5s infinite;">高次元演算中...因果律を書き換えています</div>
                <div id="ad-timer" style="font-size:3rem; color:var(--accent-color); font-weight:900;">5</div>
            </div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let t = 5;
        const intv = setInterval(() => {
            t--;
            impactEffect();
            document.getElementById("ad-timer").innerText = t;
            if (t <= 0) { clearInterval(intv); showResult(); }
        }, 1000);
    }

    function showResult() {
        impactEffect();
        playHeavyClick();
        setTimeout(playGlitchSound, 200);
        
        document.getElementById("question-number").innerText = "FINAL RESULT";
        let res = currentData.results.find(r => totalScore <= r.maxScore) || currentData.results[currentData.results.length-1];
        
        document.getElementById("content-area").innerHTML = `<div id="main-text" style="font-size:1.4rem; text-align:left; padding:10px;">${res.text}</div>`;
        document.getElementById("action-area").innerHTML = `<a href="${window.location.pathname}" class="menu-btn" onclick="impactEffect()">🔙 転生ポータルへ帰還</a>`;
    }
</script>

</body>
</html>
