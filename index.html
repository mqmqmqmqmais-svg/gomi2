        :root {

            --accent-glow: rgba(162, 82, 255, 0.6);

            --text-color: #ffffff;
            --btn-bg: linear-gradient(180deg, #1f1135 0%, #0d0618 100%);

            --grid-color: rgba(162, 82, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: var(--bg-color);
            /* サイバー格子柄背景 */
            background-image: 
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            transition: all 0.6s cubic-bezier(0.15, 0.85, 0.45, 1);
        }

        /* 💡 広告配置コンテナもネオン調に同化 */
        .ad-container {
            width: 100%;
            max-width: 450px;
            min-height: 60px;
            background-color: rgba(0, 0, 0, 0.4);
            border: 1px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555577;
            font-size: 0.75rem;
            margin: 10px 0;
            border-radius: 8px;
            letter-spacing: 2px;
            flex-shrink: 0;
        }

        /* 🏠 ホーム戻りボタンの大改善（超立体・全面判定・常時脈動ネオン） */
        #app-header {
            width: 100%;
            display: flex;
            justify-content: flex-start;
            margin-bottom: 20px;
        }
        .home-back-btn {
            background: var(--btn-bg);
            border: 2px solid var(--btn-border);
            color: #fff;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 22px;
            width: auto;
            border-radius: 30px;
            font-weight: 900;
            letter-spacing: 1px;
            /* 強烈な3D立体感とネオン発光 */
            box-shadow: 0 4px 0 #3d1b73, 0 8px 20px rgba(0, 0, 0, 0.6), 0 0 10px var(--accent-glow);
            text-shadow: 0 0 5px var(--accent-color);
            transition: all 0.1s ease;
            position: relative;
            animation: pulseGlow 2s infinite alternate;
        }

        .home-back-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #3d1b73, 0 2px 10px rgba(0, 0, 0, 0.6), 0 0 15px var(--accent-color);
            background: var(--accent-gradient);
        }

        /* 📱 アプリ本体の器（動く流線型グラデーション外枠 ＆ 巨大ネオンシールド） */
        #app-container {
            width: 100%;
            max-width: 450px;
            height: 76vh;
            min-height: 530px;
            background-color: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;

                0 20px 50px rgba(0, 0, 0, 0.8),

                inset 0 0 20px rgba(255, 255, 255, 0.02);
            border: 2px solid var(--border-color);
            padding: 30px 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            animation: containerSpawn 0.6s cubic-bezier(0.15, 0.85, 0.45, 1.1);

            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(162,82,255,0.05) 0%, transparent 60%);

            height: 8px;

            flex-direction: column;
            justify-content: center;

            position: relative;

            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 800;
            margin-bottom: 25px;
            white-space: pre-wrap;
            text-shadow: 0 4px 12px rgba(0,0,0,0.8), 0 0 10px rgba(255,255,255,0.1);
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            z-index: 2;
        }

        button, .menu-btn {
            background: var(--btn-bg);

            font-size: 1.05rem;

            border-radius: 16px;

            position: relative;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }

        /* マウスホバーや画面タッチ時の一時的過剰発光 */
        button:ok, .menu-btn:hover {
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.4), 0 10px 25px var(--accent-glow);

            transform: translateY(6px);

            align-items: center;

            width: 70px;
            height: 70px;
            border: 4px solid transparent;
            border-top: 4px solid var(--accent-color);
            border-bottom: 4px solid #00f0ff;
            border-radius: 50%;
            animation: hyperSpin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            box-shadow: 0 0 20px var(--accent-glow), inset 0 0 20px #00f0ff;
        }

        /* 🎬 各種過剰アニメーション定義 */
        @keyframes hyperSpin {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }
        @keyframes containerSpawn {
            from { opacity: 0; transform: scale(0.9) translateY(30px); filter: blur(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 4px 0 #3d1b73, 0 8px 20px rgba(0,0,0,0.6), 0 0 5px var(--accent-glow); border-color: var(--btn-border); }

            0% { transform: translate(-5%, -5%) rotate(0deg); }
            50% { transform: translate(5%, 5%) rotate(180deg); }

            0% { background-position: 0% 50%; }

            0% { text-shadow: 0 0 10px var(--accent-glow); }

        }
    </style>
</head>

    // 🎵 過剰シンセサイザー音響エフェクト
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playClickSound() {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; // 鋭いサイバー音に変更
        osc.frequency.setValueAtTime(440, now);
        osc.frequency.exponentialRampToValueAtTime(880, now + 0.08); // 急上昇する近未来サウンド
        gain.gain.setValueAtTime(0.06, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
        osc.start();
        osc.stop(now + 0.08);
    }

    function playResultSound() {
        const now = audioCtx.currentTime;
        // 壮大なSFファンファーレ和音
        const chords = [261.63, 329.63, 392.00, 523.25, 659.25, 783.99, 1046.50];
        chords.forEach((f, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            osc.connect(filter);
            filter.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(f, now + i * 0.04);
            
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2000, now);
            filter.frequency.exponentialRampToValueAtTime(200, now + 0.8);

            gain.gain.setValueAtTime(0.03, now + i * 0.04);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
            
            osc.start(now + i * 0.04);
            osc.stop(now + 0.8);
        });
    }

            ],
            results: [
                { maxScore: 18, text: "【転生先：異世界の絶技・禁忌薬草調合師】\n現世の過酷な因果律に魂が疲弊しています。来世のあなたは、世界の果てにある大樹の麓で、怪しい光を放つ魔導薬草を生成し、諸国の英雄相手に暴利を貪る至高の隠居ライフを謳歌します。" },
                { maxScore: 35, text: "【転生先：神格超越・大富豪の絶対気まぐれ愛猫】\n労働という概念の完全破壊。来世のあなたは、何一つ対価を支払うことなく最上級の魔獣缶詰を捧げられ、終日王座で微睡みながら愚かな人間たちを支配する、世界の至上君主に君臨します。" }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');

    let currentIdx = 0;
    let totalScore = 0;
    let currentData = null;

    function applyTheme(theme) {
        const root = document.documentElement;
        root.style.setProperty('--bg-color', theme.bg);
        root.style.setProperty('--card-bg', theme.card);
        root.style.setProperty('--accent-color', theme.accent);
        root.style.setProperty('--accent-gradient', theme.gradient);
        root.style.setProperty('--border-color', theme.border);
        root.style.setProperty('--btn-bg', theme.btn);
        root.style.setProperty('--btn-border', theme.btnBorder);
        root.style.setProperty('--grid-color', theme.grid);
    }

    function initApp() {
        if (shindanId && shindanDatabase[shindanId]) {
            currentData = shindanDatabase[shindanId];
            applyTheme(currentData.theme);
            document.title = currentData.title;
            document.getElementById("home-btn").style.display = "flex";
            startShindan();
        }
    }

    function goHome() {
        playClickSound();
        window.location.href = window.location.pathname;
    }

    function startShindan() {
        document.getElementById("question-number").innerText = "DATABANK CORE INITIALIZED";
        document.getElementById("main-text").innerText = currentData.title + "\n\n15の質問に答えて、あなたの隠された全パラメータを強制抽出します。";
        
        const area = document.getElementById("action-area");
        area.innerHTML = "";
        const btn = document.createElement("button");
        btn.innerText = "⚡ 精神同調（診断開始） ⚡";
        btn.onclick = () => { playClickSound(); loadQuestion(); };
        area.appendChild(btn);
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) {
            showAdScreen();
            return;
        }

        const progress = ((currentIdx) / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = `${progress}%`;
        document.getElementById("question-number").innerText = `DEEP PULSE SCANNING: ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;

        const area = document.getElementById("action-area");
        area.innerHTML = "";

        const btnYes = document.createElement("button");
        btnYes.innerText = "【 肯定 (YES) 】";
        btnYes.onclick = () => { playClickSound(); totalScore += currentData.questions[currentIdx].score; currentIdx++; loadQuestion(); };
        
        const btnNo = document.createElement("button");
        btnNo.innerText = "【 否定 (NO) 】";
        btnNo.onclick = () => { playClickSound(); currentIdx++; loadQuestion(); };

        area.appendChild(btnYes);
        area.appendChild(btnNo);
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "CRITICAL: DIMENSION INTERFERENCE";

        const content = document.getElementById("content-area");
        content.innerHTML = `
            <div class="analyzer-container">
                <div id="main-text" style="font-size:1.1rem; font-weight:900; color:#fff; text-shadow:0 0 10px var(--accent-color);">🚨 因果律データベースに強制介入中 🚨<br><span style="font-size:0.75rem; color:#888; font-weight:normal; letter-spacing:1px;">高次元魔導データを構築しています。そのまま視線を固定してください。</span></div>
                <div class="matrix-spinner"></div>
                <div id="ad-timer" style="font-size:2rem; margin-top:20px; color:var(--accent-color); font-weight:900; text-shadow:0 0 15px var(--accent-color);">7</div>
            </div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let adTime = 7;
        const interval = setInterval(() => {
            adTime--;
            document.getElementById("ad-timer").innerText = adTime;
            if (adTime <= 0) {
                clearInterval(interval);
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        playResultSound();
        document.getElementById("question-number").innerText = "FINAL ANALYSIS CONFIRMED";
        
        let finalResult = currentData.results[currentData.results.length - 1].text;
        for (let r of currentData.results) {
            if (totalScore <= r.maxScore) {
                finalResult = r.text;
                break;
            }
        }

        const content = document.getElementById("content-area");
        content.innerHTML = `<div id="main-text" style="animation: containerSpawn 0.5s ease-out; font-size:1.15rem; line-height:1.7;">${finalResult}</div>`;

        const area = document.getElementById("action-area");
        area.innerHTML = "";
        
        const btnMenu = document.createElement("button");
        btnMenu.innerText = "転生ポータル（メニュー）へ帰還する";
        btnMenu.onclick = goHome;
        area.appendChild(btnMenu);
    }

    initApp();
</script>

</body>
</html>
