<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【無料】おもしろ診断・占い研究所</title>
    <style>
        /* 全端末共通の基本リセット */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #0f0f15;
            color: #e0e0e8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 💡 広告配置コンテナ（PC・スマホ両対応） */
        .ad-container {
            width: 100%;
            max-width: 450px;
            min-height: 60px;
            background-color: #1a1a26;
            border: 1px dashed #3a3a50;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #6a6a7e;
            font-size: 0.8rem;
            margin: 10px 0;
            border-radius: 8px;
            text-align: center;
            flex-shrink: 0;
        }

        /* 📱 アプリ本体の器（幅を450pxに固定して両脇に余白を作るプロ設計） */
        #app-container {
            width: 100%;
            max-width: 450px;
            height: 70vh;
            min-height: 460px;
            background-color: #161622;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid #2b2b3d;
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background-color: #252538;
            border-radius: 3px;
            margin-bottom: 20px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #8a2be2, #4a00e0);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        #question-number {
            font-size: 0.9rem;
            color: #8a8a9e;
            margin-bottom: 10px;
        }

        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #main-text {
            font-size: 1.25rem;
            line-height: 1.6;
            font-weight: bold;
            margin-bottom: 30px;
            white-space: pre-wrap;
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* メニュー用のリンクボタン・診断用のボタン共通 */
        button, .menu-btn {
            background-color: #202030;
            color: #ffffff;
            border: 1px solid #3a3a50;
            padding: 16px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            width: 100%;
            font-weight: 500;
            font-family: inherit;
            text-decoration: none;
            display: block;
            text-align: center;
        }

        button:active, .menu-btn:active {
            background-color: #8a2be2;
            border-color: #8a2be2;
            transform: scale(0.98);
        }

        .ad-screen {
            background-color: #000000 !important;
            color: #ffffff;
        }
        #ad-timer {
            font-size: 3rem;
            color: #ffcc00;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="ad-container" id="top-ad">
        【スポンサーリンク（広告表示エリア）】
    </div>

    <div id="app-container">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <div id="question-number">MENU</div>
        <div id="content-area">
            <div id="main-text" style="font-size: 1.4rem; color: #a252ff;">🔮 診断・占いポータル 🔮</div>
            <p style="color: #aaa; font-size: 0.9.rem; margin-bottom: 20px;">あなたの隠された本性を暴く、厳選心理テスト</p>
        </div>
        <div id="action-area">
            <a href="?id=psycho" class="menu-btn" style="border-left: 4px solid #ff3333;">1. あなたの隠された裏性格・サイコパス診断</a>
            <a href="?id=talent" class="menu-btn" style="border-left: 4px solid #33ff33; margin-top: 5px;">2. 近日公開：裏の才能と本当に向いている適職占い</a>
            <a href="?id=future" class="menu-btn" style="border-left: 4px solid #3333ff; margin-top: 5px;">3. 近日公開：時空の歪みから導く「来世の職業」</a>
        </div>
    </div>

    <div class="ad-container" id="bottom-ad">
        【スポンサーリンク（広告表示エリア）】
    </div>

<script>
    // 💡 拡張データ：今後新しい診断を増やす時は、この中にテキストを追加するだけ！ファイル分割不要！
    const shindanDatabase = {
        psycho: {
            title: "あなたの隠された裏性格診断",
            questions: [
                { text: "休日は一人で過ごす方が回復する？", score: 1 },
                { text: "他人の嘘は割とすぐに見抜ける方だ？", score: 2 },
                { text: "計画通りに進まないとイライラする？", score: 1 },
                { text: "ホラー映画や怪談はどちらかといえば好き？", score: 2 },
                { text: "買い物をするとき、直感で即決することが多い？", score: 1 },
                { text: "人から「掴みどころがない」と言われたことがある？", score: 2 },
                { text: "約束の時間には必ず5分前には到着する？", score: 1 },
                { text: "宝くじで大金が当たったら、誰にも言わずに隠す？", score: 2 },
                { text: "理不尽なルールには従いたくないと思う？", score: 2 },
                { text: "自分には、他人に明かしていない秘密の趣味がある？", score: 3 }
            ],
            results: [
                { maxScore: 7, text: "【堅実な常識人タイプ】\nあなたは表裏が少なく、社会的な信頼性の高い人物です。真面目で安心できる存在と思われていますが、たまには本音を爆発させる時間も大切に。" },
                { maxScore: 12, text: "【隠れミステリアスタイプ】\n表面上うまく周囲に合わせていますが、内面には独自の鋭い世界観を持っています。他人の本質を見抜く目が長けている人物です。" },
                { maxScore: 20, text: "【孤高のインテリジェンスタイプ】\nあなたの裏の顔は、完全な合理主義者です。感情に流されず、物事を客観的に処理する冷徹なまでの知性を持っています。秘密主義な傾向があります。" }
            ]
        }
        // 新しい診断（talentやfuture）はここに後からコピペで追加されます！
    };

    // URLのパラメーター（?id=xxx）を自動解析するシステム
    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');

    let currentIdx = 0;
    let totalScore = 0;
    let currentData = null;

    function initApp() {
        // パラメーターに対応する診断データがある場合のみ診断をスタート、なければメニューを表示
        if (shindanId && shindanDatabase[shindanId]) {
            currentData = shindanDatabase[shindanId];
            document.title = currentData.title;
            startShindan();
        }
    }

    function startShindan() {
        document.getElementById("question-number").innerText = "START";
        document.getElementById("main-text").innerText = currentData.title + "\n\n10の質問で、あなたの本質を暴きます。";
        
        const area = document.getElementById("action-area");
        area.innerHTML = "";
        const btn = document.createElement("button");
        btn.innerText = "診断を始める";
        btn.onclick = loadQuestion;
        area.appendChild(btn);
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) {
            showAdScreen();
            return;
        }

        const progress = ((currentIdx) / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = `${progress}%`;
        document.getElementById("question-number").innerText = `質問 ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;

        const area = document.getElementById("action-area");
        area.innerHTML = "";

        const btnYes = document.createElement("button");
        btnYes.innerText = "はい";
        btnYes.onclick = () => { totalScore += currentData.questions[currentIdx].score; currentIdx++; loadQuestion(); };
        
        const btnNo = document.createElement("button");
        btnNo.innerText = "いいえ";
        btnNo.onclick = () => { currentIdx++; loadQuestion(); };

        area.appendChild(btnYes);
        area.appendChild(btnNo);
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "ANALYZING";
        document.getElementById("app-container").classList.add("ad-screen");

        const content = document.getElementById("content-area");
        content.innerHTML = `
            <div id="main-text">診断結果を高度解析中...<br><span style="font-size:0.8rem; color:#888;">※解析完了までしばらくお待ちください</span></div>
            <div id="ad-timer">15</div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let adTime = 15;
        const interval = setInterval(() => {
            adTime--;
            document.getElementById("ad-timer").innerText = adTime;
            if (adTime <= 0) {
                clearInterval(interval);
                showResult();
            }
        }, 1000);
    }

    function showResult() {
        document.getElementById("app-container").classList.remove("ad-screen");
        document.getElementById("question-number").innerText = "RESULT";
        
        let finalResult = currentData.results[currentData.results.length - 1].text;
        for (let r of currentData.results) {
            if (totalScore <= r.maxScore) {
                finalResult = r.text;
                break;
            }
        }

        const content = document.getElementById("content-area");
        content.innerHTML = `<div id="main-text">${finalResult}</div>`;

        const area = document.getElementById("action-area");
        area.innerHTML = "";
        
        // メニューに戻るボタン
        const btnMenu = document.createElement("button");
        btnMenu.innerText = "トップメニューに戻る";
        btnMenu.onclick = () => window.location.href = window.location.pathname;
        area.appendChild(btnMenu);
    }

    initApp();
</script>

</body>
</html>
