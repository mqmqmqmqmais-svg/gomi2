<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【極限超越】次元崩壊・超・診断占いシステム</title>
    <style>
        /* 🎨 限界突破ネオン・次元崩壊変数 */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(5, 5, 10, 0.92); /* 透明度を下げて文字を読みやすく */
            --accent-color: #a252ff;
            --accent-glow: rgba(162, 82, 255, 0.8);
            --border-color: #5c2ea6;
            --text-color: #ffffff;
            --btn-bg: linear-gradient(180deg, #1f1135 0%, #05020a 100%);
            --grid-color: rgba(162, 82, 255, 0.15);
            --glitch-color1: #00ffff;
            --glitch-color2: #ff00ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: var(--text-color);
            /* 読みやすいフォントスタックに変更 */
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 🌌 Canvas背景（リアルタイムパーティクル演算用） */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.9;
            mix-blend-mode: screen;
        }

        /* 📺 画面端を暗くするヴィネット効果（スキャンラインは廃止してクリアに） */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 150%);
            pointer-events: none;
            z-index: 999;
        }

        /* 💡 広告エリア */
        .ad-container {
            width: 90%;
            max-width: 450px;
            height: 60px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 900;
            margin: 15px 0;
            border-radius: 4px;
            letter-spacing: 4px;
            z-index: 10;
            box-shadow: 0 0 15px var(--accent-glow), inset 0 0 10px var(--accent-glow);
            animation: adFlash 3s infinite alternate;
        }

        /* 📱 アプリコンテナ */
        #app-container {
            width: 95%;
            max-width: 450px;
            height: 70vh;
            min-height: 500px;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            border: 3px solid var(--border-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            box-shadow: 0 0 40px var(--accent-glow), inset 0 0 20px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            animation: containerFloat 4s ease-in-out infinite, rgbSplit 5s infinite;
        }

        /* 📊 超光速プログレスバー */
        #progress-container {
            width: 100%;
            height: 12px;
            background: #000;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px var(--accent-glow);
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, transparent, #fff, var(--accent-color));
            box-shadow: 0 0 20px #fff;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: progressSpark 0.5s infinite;
        }

        #question-number {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            letter-spacing: 3px;
            font-weight: 900;
            text-shadow: 0 0 10px var(--accent-glow);
            text-align: center;
        }

        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
        }

        /* 💥 メインテキスト（縁取りを強化して圧倒的に読みやすく） */
        #main-text {
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 900;
            margin-bottom: 20px;
            color: #ffffff;
            /* 背景のパーティクルに負けない強固なドロップシャドウ */
            text-shadow: 
                2px 2px 0px #000, 
                -2px -2px 0px #000, 
                2px -2px 0px #000, 
                -2px 2px 0px #000, 
                0 0 15px var(--accent-color);
            position: relative;
            transition: all 0.3s;
            word-break: keep-all;
        }
        .glitch-active {
            animation: glitchText 0.3s cubic-bezier(.25, .46, .45, .94) both;
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        /* ✨ 破壊的立体ボタン */
        button, .menu-btn {
            background: var(--btn-bg);
            color: #fff;
            border: 2px solid var(--border-color);
            padding: 18px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: 900;
            text-decoration: none;
            display: block;
            text-align: center;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 6px 0px calc(var(--border-color) - #222), 0 10px 15px rgba(0,0,0,0.8), 0 0 15px var(--accent-glow);
            transition: all 0.1s;
            text-shadow: 1px 1px 2px #000, 0 0 8px #fff;
        }

        button::before, .menu-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: translateY(-50%) skewX(-45deg);
            transition: 0.5s;
        }
        button:hover::before, .menu-btn:hover::before {
            left: 200%;
        }

        button:active, .menu-btn:active {
            transform: translateY(6px) scale(0.98);
            box-shadow: 0 0px 0px transparent, 0 2px 5px rgba(0,0,0,0.9), 0 0 20px var(--accent-color);
            background: var(--accent-color);
            color: #000;
            text-shadow: none;
        }

        /* 🌀 広告待機中の異次元エフェクト */
        .analyzer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .magic-circle {
            width: 120px;
            height: 120px;
            border: 6px dashed var(--accent-color);
            border-radius: 50%;
            position: relative;
            animation: spinCircle 2s linear infinite;
            box-shadow: 0 0 30px var(--accent-glow), inset 0 0 30px var(--accent-glow);
        }
        .magic-circle::before {
            content: '';
            position: absolute;
            top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 3px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: spinCircle 1s linear infinite reverse;
        }

        /* 🎬 限界突破アニメーション群（目に優しいレベルに調整） */
        @keyframes containerFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        @keyframes rgbSplit {
            0%, 100% { box-shadow: -2px 0 15px var(--glitch-color1), 2px 0 15px var(--glitch-color2), 0 0 30px var(--accent-glow); }
            50% { box-shadow: 2px 0 15px var(--glitch-color1), -2px 0 15px var(--glitch-color2), 0 0 50px var(--accent-glow); }
        }
        @keyframes adFlash {
            0%, 100% { opacity: 1; border-color: var(--accent-color); }
            50% { opacity: 0.8; border-color: #fff; text-shadow: 0 0 5px #fff; }
        }
        @keyframes progressSpark {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
            100% { filter: brightness(1); }
        }
        @keyframes spinCircle {
            100% { transform: rotate(360deg); }
        }
        @keyframes glitchText {
            0% { transform: translate(0); }
            25% { transform: translate(-2px, 1px); }
            50% { transform: translate(2px, -1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0); }
        }
        /* 画面揺れ（フラッシュ色反転を削除し、純粋な微振動のみに） */
        .screen-shake {
            animation: shake 0.2s cubic-bezier(.36,.07,.19,.97) both;
        }
        @keyframes shake {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(3px, 3px) rotate(0.5deg); }
            50% { transform: translate(-3px, -3px) rotate(-0.5deg); }
            75% { transform: translate(-3px, 3px) rotate(0.5deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
    </style>
</head>

            <a href="?id=talent" class="menu-btn" style="--accent-color:#00ff00; --border-color:#008a00; --btn-bg:linear-gradient(180deg, #002a00, #000);" onclick="impactEffect()">⚡ 2. 神殺しの器・才能覚醒診断</a>
            <a href="?id=future" class="menu-btn" style="--accent-color:#ffaa00; --border-color:#8a5c00; --btn-bg:linear-gradient(180deg, #2a1c00, #000);" onclick="impactEffect()">🌌 3. 来世の業象・時空転生診断</a>

<script>
    /* 🎵 Web Audio API */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playHeavyClick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'square';
        osc.frequency.setValueAtTime(100, t);
        osc.frequency.exponentialRampToValueAtTime(20, t + 0.1);
        gain.gain.setValueAtTime(0.15, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        
        osc.start(t);
        osc.stop(t + 0.1);
    }

    function playGlitchSound() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
        
        noise.connect(gain).connect(audioCtx.destination);
        noise.start();
    }

    /* 💥 画面振動（フラッシュなし） */
    function impactEffect() {
        playHeavyClick();
        document.body.classList.remove("screen-shake");
        void document.body.offsetWidth;
        document.body.classList.add("screen-shake");
        
        const txt = document.getElementById("main-text");
        if(txt) {
            txt.classList.add("glitch-active");
            setTimeout(() => txt.classList.remove("glitch-active"), 300);
        }
    }

    /* 🌌 Canvasパーティクル演算（全テーマを超強化） */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleMode = 'default';

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            
            if(particleMode === 'psycho') {
                // 狂気の赤：画面中央から爆発的に蠢き、拡散する血とノイズ
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 100;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 100;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed + 2; // 少し下に滴る
                this.size = Math.random() * 6 + 1;
                this.color = `rgba(255, ${Math.random()*20}, ${Math.random()*20}, ${Math.random()*0.8 + 0.2})`;
                this.life = Math.random() * 0.5 + 0.5;
                
            } else if(particleMode === 'talent') {
                // サイバー降雨：圧倒的スピードで落ちるマトリックスコード
                this.x = Math.floor(Math.random() * (canvas.width/15)) * 15;
                this.y = -Math.random() * canvas.height;
                this.vx = 0;
                this.vy = Math.random() * 20 + 10; // 超高速
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(0, 255, ${Math.random()*150+100}, ${Math.random()*0.8 + 0.2})`;
                this.char = String.fromCharCode(0x30A0 + Math.random() * 96); // カタカナ・記号
                
            } else if(particleMode === 'future') {
                // 宇宙ワープ：放射状に迫りくる星屑
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 2 + 0.5;
                this.color = `rgba(${Math.random()*100+150}, ${Math.random()*100+150}, 255, 0.9)`;
                
            } else {
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2;
                this.color = 'rgba(162, 82, 255, 0.5)';
            }
        }
        
        update() {
            this.x += this.vx;
            this.y += this.vy;
            
            if(particleMode === 'psycho') {
                this.size *= 0.96; // 飛び散りながら消える
                if(this.size < 0.5) this.reset();
            } else if(particleMode === 'future') {
                this.size *= 1.06; // 迫ってくる
            }
            
            if (this.y > canvas.height || this.y < 0 || this.x > canvas.width || this.x < 0) {
                this.reset();
            }
        }
        
        draw() {
            if(particleMode === 'talent') {
                ctx.fillStyle = this.color;
                ctx.font = '16px monospace';
                ctx.fillText(this.char, this.x, this.y);
                // たまに文字が変わるバグ表現
                if(Math.random() > 0.9) this.char = String.fromCharCode(0x30A0 + Math.random() * 96);
            } else {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    // パーティクルの数（過剰演出のため大量配置）
    for (let i = 0; i < 200; i++) particles.push(new Particle());

    function animateParticles() {
        // 残像効果の調整（サイコパスとマトリックスは残像を強くする）
        if(particleMode === 'talent' || particleMode === 'psycho') {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        } else {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* 💡 テーマ別データベース */

                { maxScore: 99, text: "【超越者：純粋悪の顕現】\nあなたの本質は完全なサイコパスです。感情という無駄な機能を排除した、恐るべき合理主義の化身です。" }

            questions: [

                { text: "他人の行動パターンを瞬時に解析し、次の言葉を先読みできる？", score: 2 },

                { maxScore: 99, text: "【神格化：次元喰いの星霊】\n肉体を捨て、星を喰らい宇宙を創造する概念的存在（神）へ至ります。この宇宙はあなたの箱庭となります。" }

    };

    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');
    let currentIdx = 0, totalScore = 0, currentData = null;

    function applyTheme(t) {
        const r = document.documentElement;
        r.style.setProperty('--bg-color', t.bg);
        r.style.setProperty('--card-bg', t.card);
        r.style.setProperty('--accent-color', t.accent);
        r.style.setProperty('--accent-glow', t.glow);
        r.style.setProperty('--border-color', t.border);
        r.style.setProperty('--btn-bg', t.btn);
        particleMode = currentData.mode;
        particles.forEach(p => p.reset());
    }

    if (shindanId && shindanDatabase[shindanId]) {
        currentData = shindanDatabase[shindanId];
        applyTheme(currentData.theme);
        document.title = currentData.title;
        document.getElementById("progress-container").style.display = "block";
        document.getElementById("action-area").innerHTML = `<button onclick="startQuestion()">⚡ 精神をリンクする ⚡</button>`;
        document.getElementById("main-text").innerText = currentData.title;
        document.getElementById("question-number").innerText = "DIMENSION SYNC READY";
    }

    function startQuestion() {
        impactEffect();
        playGlitchSound();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) { showAdScreen(); return; }
        
        const prog = (currentIdx / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = prog + "%";
        document.getElementById("question-number").innerText = `SCANNING MEMORY: ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;
        
        const area = document.getElementById("action-area");
        area.innerHTML = `
            <button onclick="answer(true)">[ YES / 肯定 ]</button>
            <button onclick="answer(false)">[ NO / 否定 ]</button>
        `;
    }

    function answer(isYes) {
        impactEffect();
        if(Math.random() > 0.7) playGlitchSound();
        if(isYes) totalScore += currentData.questions[currentIdx].score;
        currentIdx++;
        loadQuestion();
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "⚠️ SYSTEM OVERLOAD ⚠️";
        
        document.getElementById("content-area").innerHTML = `
            <div class="analyzer-container">
                <div class="magic-circle"></div>
                <div id="main-text" style="margin-top:20px; font-size:1.2rem;">高次元演算中...因果律を書き換えています</div>
                <div id="ad-timer" style="font-size:3rem; color:var(--accent-color); font-weight:900;">5</div>
            </div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let t = 5;
        const intv = setInterval(() => {
            t--;
            impactEffect();
            document.getElementById("ad-timer").innerText = t;
            if (t <= 0) { clearInterval(intv); showResult(); }
        }, 1000);
    }

    function showResult() {
        impactEffect();
        playHeavyClick();
        setTimeout(playGlitchSound, 200);
        
        document.getElementById("question-number").innerText = "FINAL RESULT";
        let res = currentData.results.find(r => totalScore <= r.maxScore) || currentData.results[currentData.results.length-1];
        
        document.getElementById("content-area").innerHTML = `<div id="main-text" style="font-size:1.3rem; text-align:left; padding:10px;">${res.text}</div>`;
        document.getElementById("action-area").innerHTML = `<a href="${window.location.pathname}" class="menu-btn" onclick="impactEffect()">🔙 転生ポータルへ帰還</a>`;
    }
</script>

</body>
</html>
