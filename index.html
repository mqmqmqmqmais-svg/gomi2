<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>【極限超越】次元崩壊・超・診断占いシステム</title>
    <style>
        /* 🎨 変数定義 */
        :root {
            --bg-color: #000000;
            --card-bg: rgba(10, 10, 15, 0.98); /* 不透明度を上げてより文字を読みやすく */
            --accent-color: #a252ff;
            --accent-glow: rgba(162, 82, 255, 0.8);
            --border-color: #5c2ea6;
            --text-color: #ffffff;
            --btn-bg: linear-gradient(180deg, #1f1135 0%, #05020a 100%);
            --glitch-color1: #00ffff;
            --glitch-color2: #ff00ff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        body {
            background-color: #000;
            color: var(--text-color);
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 🌌 Canvas背景（パーティクルは維持） */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        /* 背景の僅かなグラデーション */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, transparent 50%, rgba(0, 0, 0, 0.8) 150%);
            pointer-events: none;
            z-index: -1;
        }

        /* 💡 広告エリア */
        .ad-container {
            width: 90%;
            max-width: 450px;
            height: 60px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px dashed var(--border-color);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            font-size: 0.9rem;
            font-weight: 900;
            margin: 15px 0;
            border-radius: 4px;
            letter-spacing: 2px;
            z-index: 10;
        }

        /* 📱 アプリコンテナ */
        #app-container {
            width: 95%;
            max-width: 450px;
            height: 70vh;
            min-height: 500px;
            background: var(--card-bg);
            border-radius: 12px;
            border: 2px solid var(--border-color);
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
            /* 強すぎたシャドウと揺れアニメーションを軽減 */
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* 📊 プログレスバー */
        #progress-container {
            width: 100%;
            height: 12px;
            background: #111;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #555, var(--accent-color));
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #question-number {
            font-size: 1rem;
            color: var(--accent-color);
            margin-bottom: 15px;
            letter-spacing: 2px;
            font-weight: bold;
            text-align: center;
        }

        #content-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            overflow-y: auto;
        }

        /* 💥 メインテキスト（過剰なシャドウを削除し、純粋に読みやすく） */
        #main-text {
            font-size: 1.3rem;
            line-height: 1.6;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            padding: 0 10px;
            white-space: pre-wrap;
        }

        #action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 10px;
        }

        /* ✨ ボタン */
        button, .menu-btn {
            background: var(--btn-bg);
            color: #fff;
            border: 1px solid var(--border-color);
            padding: 18px;
            font-size: 1.1rem;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            text-align: center;
            letter-spacing: 1px;
            transition: transform 0.1s, background 0.2s;
        }

        /* ボタンのホバー＆アクティブ（フラッシュなし、少し沈むだけ） */
        button:active, .menu-btn:active {
            transform: translateY(3px);
            background: var(--border-color);
        }

        /* 🌀 広告待機中のエフェクト */
        .analyzer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        .magic-circle {
            width: 100px;
            height: 100px;
            border: 4px dashed var(--accent-color);
            border-radius: 50%;
            position: relative;
            animation: spinCircle 3s linear infinite;
        }

        @keyframes spinCircle {
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- 粒子描画用キャンバス -->
    <canvas id="bg-canvas"></canvas>

    <div class="ad-container" id="top-ad">【NEON AD SPACE: TOP】</div>

    <div id="app-container">
        <div id="progress-container" style="display:none;">
            <div id="progress-bar"></div>
        </div>
        <div id="question-number">SYSTEM BOOTING...</div>
        <div id="content-area">
            <div id="main-text" style="font-size:1.5rem;">🔮 超次元診断ポータル 🔮<br><span style="font-size:1rem; color:#aaa; font-weight:normal;">テーマを選択してください</span></div>
        </div>
        <div id="action-area">
            <a href="?id=psycho" class="menu-btn" style="--accent-color:#ff003c; --border-color:#8a0020; --btn-bg:linear-gradient(180deg, #2a000a, #000);" onclick="playHeavyClick()">☠ 1. サイコパス狂気診断</a>
            <a href="?id=talent" class="menu-btn" style="--accent-color:#00ff00; --border-color:#008a00; --btn-bg:linear-gradient(180deg, #002a00, #000);" onclick="playHeavyClick()">⚡ 2. 神殺しの器・才能覚醒診断</a>
            <a href="?id=future" class="menu-btn" style="--accent-color:#ffaa00; --border-color:#8a5c00; --btn-bg:linear-gradient(180deg, #2a1c00, #000);" onclick="playHeavyClick()">🌌 3. 来世の業象・時空転生診断</a>
        </div>
    </div>

    <div class="ad-container" id="bottom-ad">【NEON AD SPACE: BOTTOM】</div>

<script>
    /* 🎵 クリック音のみ（フラッシュ・画面揺れは削除） */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playHeavyClick() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(50, t + 0.1); 
        gain.gain.setValueAtTime(0.1, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        
        osc.start(t);
        osc.stop(t + 0.1);
    }

    /* 🌌 Canvasパーティクル演算（エフェクトは維持） */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let particleMode = 'default'; // default, psycho, talent, future

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() { this.reset(); }
        reset() {
            if(particleMode === 'psycho') {
                this.x = canvas.width / 2 + (Math.random() - 0.5) * 20;
                this.y = canvas.height / 2 + (Math.random() - 0.5) * 20;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 20 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = Math.random() * 6 + 2;
                this.color = `rgba(255, 0, ${Math.random()*40}, ${Math.random()*0.8 + 0.2})`;
            } else if(particleMode === 'talent') {
                this.x = Math.floor(Math.random() * (canvas.width/20)) * 20;
                this.y = -Math.random() * canvas.height;
                this.vx = 0;
                this.vy = Math.random() * 30 + 10;
                this.size = Math.random() * 2 + 1;
                this.color = `rgba(0, 255, ${Math.random()*150+100}, 0.9)`;
                this.char = String.fromCharCode(0x30A0 + Math.random() * 96);
            } else if(particleMode === 'future') {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 15 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed; 
                this.size = Math.random() * 3 + 1;
                this.color = `rgba(255, ${Math.random()*100+150}, 0, 0.8)`;
            } else {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5);
                this.vy = (Math.random() - 0.5);
                this.size = Math.random() * 2;
                this.color = 'rgba(162, 82, 255, 0.5)';
            }
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            if(particleMode === 'future' || particleMode === 'psycho') this.size *= 1.05;
            if (this.y > canvas.height || this.y < 0 || this.x > canvas.width || this.x < 0) this.reset();
        }
        draw() {
            ctx.fillStyle = this.color;
            if(particleMode === 'talent') {
                ctx.font = 'bold 18px monospace';
                ctx.fillText(this.char, this.x, this.y);
            } else {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }

    for (let i = 0; i < 200; i++) particles.push(new Particle());

    function animateParticles() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    animateParticles();

    /* 💡 テーマ別データベース（診断内容を正常化・最適化） */
    const shindanDatabase = {
        psycho: {
            title: "☠ サイコパス狂気診断",
            mode: "psycho",
            theme: { bg: "#0a0000", card: "rgba(20, 0, 0, 0.95)", accent: "#ff003c", glow: "rgba(255, 0, 60, 0.8)", border: "#8a0020", btn: "linear-gradient(180deg, #3a000d, #000)" },
            questions: [
                { text: "他人が悲しんでいたり、泣いているのを見ても、あまり何も感じない。", score: 3 },
                { text: "自分の目的を達成するためなら、多少嘘をついたり人を騙しても構わないと思う。", score: 3 },
                { text: "カッとなると、後先考えずに衝動的な行動をとってしまうことが多い。", score: 2 },
                { text: "自分は他の人よりも特別で、優れている人間だと心の底で思っている。", score: 2 },
                { text: "悪いことをしても、「仕方なかった」「自分のせいではない」と言い訳を見つけるのが得意だ。", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【サイコパス度：低（0〜30%）】\nあなたはごく一般的な良識と共感性を持った人です。他人の痛みがわかり、ルールを守ろうとする正常な感覚を持っています。安心して社会生活を送ってください。" },
                { maxScore: 10, text: "【サイコパス度：中（40〜70%）】\n少し自己中心的な面があるようです。合理的な判断が得意な反面、冷たい印象を持たれることがあるかもしれません。時と場合によってはサイコパス的な思考を活用できるタイプです。" },
                { maxScore: 99, text: "【サイコパス度：高（80%〜）】\nサイコパス傾向が非常に高いです。他者への共感が乏しく、目的のためなら手段を選ばない冷徹さを持っています。その合理性を活かせる場所を見つければ大成するかもしれません。" }
            ]
        },
        talent: {
            title: "⚡ 神殺しの器・才能覚醒診断",
            mode: "talent",
            theme: { bg: "#000a05", card: "rgba(0, 20, 10, 0.95)", accent: "#00ffaa", glow: "rgba(0, 255, 170, 0.8)", border: "#008a4c", btn: "linear-gradient(180deg, #003a20, #000)" },
            questions: [
                { text: "既存のルールやマニュアルに従うよりも、自分で全く新しいやり方を考える方が好きだ。", score: 3 },
                { text: "興味を持ったことには、寝食を忘れるほど異常な集中力を発揮する。", score: 2 },
                { text: "周りの人が「常識だ」と言っていることに対して、「本当にそうか？」と疑問を持つことが多い。", score: 3 },
                { text: "感情論で話されるのが苦手で、常に論理的・合理的な解決策を求めてしまう。", score: 2 },
                { text: "誰も思いつかないような突飛なアイデアをひらめく瞬間がよくある。", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【適応型タレント：協調性の才能】\nあなたの才能は「和を尊ぶ」ことにあります。組織の中でうまく立ち回り、チームを円滑に進めるバランス感覚に優れています。突飛な才能よりも、堅実な努力で成功するタイプです。" },
                { maxScore: 10, text: "【開拓型タレント：アイデアの才能】\n一般的な常識に囚われない、柔軟な発想力を持っています。新しい企画を立ち上げたり、問題を別の角度から解決するクリエイターとしての才能が眠っているようです。" },
                { maxScore: 99, text: "【革命型タレント：破壊と創造の才能】\n既存のシステムを根本から覆す、天才的な（あるいは異端な）才能を秘めています。常識にとらわれず、ゼロからイチを生み出す圧倒的な熱量とビジョンを持つイノベーター気質です。" }
            ]
        },
        future: {
            title: "🌌 来世の業象・時空転生診断",
            mode: "future",
            theme: { bg: "#050010", card: "rgba(10, 0, 20, 0.95)", accent: "#ffaa00", glow: "rgba(255, 170, 0, 0.8)", border: "#8a00cc", btn: "linear-gradient(180deg, #3a0066, #000)" },
            questions: [
                { text: "自然や動物と触れ合っていると、人間関係の悩みなどどうでもよくなる。", score: 2 },
                { text: "時々、今の自分が生きているこの時代や場所に「違和感」を覚えることがある。", score: 3 },
                { text: "争いごとや競争社会には疲れ果てており、とにかく穏やかに過ごしたい。", score: 2 },
                { text: "人間という生き物の複雑な感情やしがらみが、ひどく面倒だと感じる。", score: 3 },
                { text: "星空や宇宙の映像を見ていると、なぜか懐かしい気持ちになる。", score: 3 }
            ],
            results: [
                { maxScore: 5, text: "【来世の姿：人間への再転生】\nあなたの魂は、まだ人間社会での学びやドラマにやり残したことがあるようです。来世でも再び人間として生まれ、より豊かな人生の経験を積んでいくことになるでしょう。" },
                { maxScore: 10, text: "【来世の姿：自然界の精霊・動物】\n人間の複雑な感情や社会構造に少し疲れているようです。来世はしがらみのない、自由な動物や、自然と調和する存在に転生し、穏やかで平和な時を過ごすでしょう。" },
                { maxScore: 99, text: "【来世の姿：宇宙の星々・エネルギー体】\nあなたの魂は地球という枠組みを卒業する段階に来ています。来世では肉体を持たず、宇宙を漂う星や、純粋なエネルギー体として高次元の世界を旅することになるでしょう。" }
            ]
        }
    };

    const urlParams = new URLSearchParams(window.location.search);
    const shindanId = urlParams.get('id');
    let currentIdx = 0, totalScore = 0, currentData = null;

    function applyTheme(t) {
        const r = document.documentElement;
        r.style.setProperty('--bg-color', t.bg);
        r.style.setProperty('--card-bg', t.card);
        r.style.setProperty('--accent-color', t.accent);
        r.style.setProperty('--accent-glow', t.glow);
        r.style.setProperty('--border-color', t.border);
        r.style.setProperty('--btn-bg', t.btn);
        particleMode = currentData.mode;
        particles.forEach(p => p.reset());
    }

    if (shindanId && shindanDatabase[shindanId]) {
        currentData = shindanDatabase[shindanId];
        applyTheme(currentData.theme);
        document.title = currentData.title;
        document.getElementById("progress-container").style.display = "block";
        document.getElementById("action-area").innerHTML = `<button onclick="startQuestion()">診断を開始する</button>`;
        document.getElementById("main-text").innerText = currentData.title;
        document.getElementById("question-number").innerText = "READY";
    }

    function startQuestion() {
        playHeavyClick();
        loadQuestion();
    }

    function loadQuestion() {
        if (currentIdx >= currentData.questions.length) { showAdScreen(); return; }
        
        const prog = (currentIdx / currentData.questions.length) * 100;
        document.getElementById("progress-bar").style.width = prog + "%";
        document.getElementById("question-number").innerText = `QUESTION: ${currentIdx + 1} / ${currentData.questions.length}`;
        document.getElementById("main-text").innerText = currentData.questions[currentIdx].text;
        
        const area = document.getElementById("action-area");
        area.innerHTML = `
            <button onclick="answer(true)">はい / YES</button>
            <button onclick="answer(false)">いいえ / NO</button>
        `;
    }

    function answer(isYes) {
        playHeavyClick();
        if(isYes) totalScore += currentData.questions[currentIdx].score;
        currentIdx++;
        loadQuestion();
    }

    function showAdScreen() {
        document.getElementById("progress-bar").style.width = "100%";
        document.getElementById("question-number").innerText = "ANALYZING...";
        
        document.getElementById("content-area").innerHTML = `
            <div class="analyzer-container">
                <div class="magic-circle"></div>
                <div id="main-text" style="margin-top:20px; font-size:1.1rem; color:#ccc;">結果を解析中...</div>
                <div id="ad-timer" style="font-size:2rem; color:var(--accent-color); font-weight:bold;">5</div>
            </div>
        `;
        document.getElementById("action-area").innerHTML = "";

        let t = 5;
        const intv = setInterval(() => {
            t--;
            document.getElementById("ad-timer").innerText = t;
            if (t <= 0) { clearInterval(intv); showResult(); }
        }, 1000);
    }

    function showResult() {
        playHeavyClick();
        
        document.getElementById("question-number").innerText = "RESULT";
        let res = currentData.results.find(r => totalScore <= r.maxScore) || currentData.results[currentData.results.length-1];
        
        document.getElementById("content-area").innerHTML = `<div id="main-text" style="font-size:1.2rem; text-align:left; padding:10px;">${res.text}</div>`;
        document.getElementById("action-area").innerHTML = `<a href="${window.location.pathname}" class="menu-btn" onclick="playHeavyClick()">トップに戻る</a>`;
    }
</script>

</body>
</html>
